# Keeps the free-tier Supabase project awake.
#
# Supabase pauses a free project after ~7 days of no activity, which is what
# broke the Hub login. This makes one tiny read against the database every day,
# which resets that 7-day clock. It uses only PUBLIC values (the project URL and
# the publishable anon key — the same ones already shipped in the site's JS), so
# there's nothing secret here and no setup required beyond pushing this file.
#
# Note: GitHub automatically pauses scheduled workflows after 60 days with NO
# commits to the repo. If this repo goes fully dormant that long, GitHub emails
# you and you re-enable it with one click (any commit also resets the clock).
name: keep-supabase-awake

on:
  schedule:
    - cron: "23 8 * * *" # daily at 08:23 UTC (off the hour so it's less likely to be delayed)
  workflow_dispatch: {} # lets you run it on demand from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase so it registers activity
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://dvddvdynaadckjdtxvxp.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: sb_publishable_vF0osOfTSWS_DBZ48g-gqw_Sy1SVWYU")
          echo "Supabase REST responded with HTTP $code"
